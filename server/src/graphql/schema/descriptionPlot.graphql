# description plot data
type DescriptionPlot {
  id: ID!
  bookID: ID!
  plot: String!
}

input BookPlotInput {
  bookID: ID!
  plot: String!
}

input UpdateBookPlotInput {
  id: ID!
  bookID: ID!
  plot: String!
}

extend type Query {
  # Get one book plot by id
  getOneBookPlot(bookID: ID): DescriptionPlot
}

extend type Mutation {
  # Add book plot
  addBookPlot(input: BookPlotInput!): DescriptionPlot!
  # Update book plot
  updateBookPlot(input: UpdateBookPlotInput!): DescriptionPlot!
}
